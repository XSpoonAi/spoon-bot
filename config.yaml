# Spoon-Bot Configuration
# All credentials are read from .env file via ${VAR} references.

# Agent Configuration
agent:
  model: "anthropic/claude-sonnet-4"
  provider: "openrouter"
  workspace: "~/.spoon-bot/workspace"
  max_iterations: 20
  tool_profile: "core"

# Session Configuration
sessions:
  default_timeout: 3600
  max_sessions: 100
  persistence: true

# Channels Configuration
channels:
  # Telegram Bot
  telegram:
    enabled: true
    accounts:
      - name: "Irene_spoon_bot"
        token: "${TELEGRAM_BOT_TOKEN}"
        mode: "polling"

        allowed_users:
          - 7656878599

        groups:
          enabled: false
          require_mention: true

        media_max_mb: 20

  # Discord Bot
  discord:
    enabled: true
    accounts:
      - name: "spoon_discord_bot"
        token: "${DISCORD_BOT_TOKEN}"
        intents:
          - "guilds"
          - "guild_messages"
          - "message_content"
          - "dm_messages"
        allowed_guilds:
          - 1476166258268311708
        allowed_users:
          - 1469248717532958823

  # Feishu Bot (WebSocket long-connection)
  feishu:
    enabled: true
    accounts:
      - name: "spoon_feishu_bot"
        app_id: "${FEISHU_APP_ID}"
        app_secret: "${FEISHU_APP_SECRET}"
        mode: "ws"

  # CLI
  cli:
    enabled: false
