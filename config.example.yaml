# Spoon-Bot Configuration Example
# Copy this file to ~/.spoon-bot/config.yaml or config.yaml
# and fill in your credentials
#
# Background service quick start:
#   spoon-bot service start          # Start in background now
#   spoon-bot service install        # Register auto-start at login
#   spoon-bot service status         # Check status
#   spoon-bot service logs -f        # Follow logs
#   spoon-bot service stop           # Stop

# Agent Configuration
agent:
  model: "anthropic/claude-sonnet-4.6"  # or "other-model-name"
  provider: "openrouter" # openai, openrouter, anthropic, google, etc.
  workspace: "~/.spoon-bot/workspace"
  max_iterations: 20
  tool_profile: "core"  # Options: core, coding, web3, research, full
  # yolo_mode: false     # YOLO mode: work directly in `workspace` path
                          # instead of a sandboxed directory.  The agent
                          # reads/writes/executes against your real filesystem.
                          # Enable via config or env: SPOON_BOT_YOLO_MODE=true
  # enabled_tools:        # Optional fine-grained override
  #   - shell
  #   - read_file
  #   - write_file
  # mcp_servers:          # Alias: mcp_config
  #   filesystem:
  #     command: "npx"
  #     args: ["-y", "@modelcontextprotocol/server-filesystem", "."]
  # shell_timeout: 600         # Default foreground timeout in seconds (10 min).
                                # Commands exceeding this are moved to background.
  # shell_max_timeout: 7200    # Max allowed per-command timeout override (2 hours).
                                # The agent can request longer timeouts up to this cap.
  # max_output: 10000
  # context_window: 200000
  # auto_reload: false          # Watch skill paths & config for changes, auto-reload
  # auto_reload_interval: 5     # Poll interval in seconds (1-300)

  # Provider retry — exponential backoff for transient LLM errors
  # (rate limits, timeouts, 5xx). Delays: ~1s, ~2s, ~4s, ~8s, ~16s
  # provider_max_retries: 5       # Max retry attempts (0 disables)
  # provider_retry_base_delay: 1  # Base delay in seconds
  # provider_retry_max_delay: 60  # Max delay cap in seconds
  # provider_retry_backoff_factor: 2  # Exponential multiplier

# Session Configuration
sessions:
  default_timeout: 3600  # Session timeout in seconds (1 hour)
  max_sessions: 100      # Maximum concurrent sessions
  persistence: true      # Save sessions to disk

# Channels Configuration
channels:
  # ========== Telegram Bot ==========
  telegram:
    enabled: false  # Set to true to enable
    accounts:
      - name: "your_bot_name"
        token: "${TELEGRAM_BOT_TOKEN}"  # Get from @BotFather
        mode: "polling"  # Options: polling, webhook

        # Webhook configuration (only if mode: webhook)
        webhook_url: "https://your-domain.com/telegram/webhook"
        webhook_secret: "your_webhook_secret"

        # Access control
        allowed_users: []  # List of Telegram user IDs (empty = allow all)
          # - 123456789
          # - 987654321

        # Group chat settings
        groups:
          enabled: true           # Allow group chats
          require_mention: true   # Require @bot_mention in groups
          allowed_chats: []       # Chat whitelist (empty = all allowed)
            # - "@group_username"
            # - -1001234567890  # Group chat ID

        # Media settings
        media_max_mb: 20  # Maximum file size in MB

        # Agent configuration for this bot
        agent_config:
          tool_profile: "full"  # This bot uses all tools
          # Or specify individual tools:
          # enabled_tools:
          #   - shell
          #   - read_file
          #   - write_file

  # ========== Discord Bot ==========
  discord:
    enabled: false  # Set to true to enable
    accounts:
      - name: "your_bot_name"
        token: "${DISCORD_BOT_TOKEN}"  # From Discord Developer Portal

        # Discord Intents (what events bot can receive)
        intents:
          - "guilds"
          - "guild_messages"
          - "message_content"  # Required to read message content
          - "dm_messages"
          # - "guild_members"  # Uncomment if needed
          # - "guild_presences"  # Uncomment if needed

        # Access control
        allowed_guilds: []  # Server whitelist (empty = all allowed)
          # - 123456789012345678  # Server ID

        allowed_users: []  # User whitelist (empty = all allowed)
          # - 987654321098765432  # User ID

        # Agent configuration
        agent_config:
          tool_profile: "coding"  # This bot focused on coding

  # ========== Feishu (Lark) Bot ==========
  feishu:
    enabled: false  # Set to true to enable
    accounts:
      # China-region Feishu app via WebSocket (long connection)
      - name: "feishu_ws_bot"
        mode: "ws"               # ws = long connection, webhook = callback mode
        domain: "feishu"         # feishu for China-region Feishu, lark for international Lark
        app_id: "${FEISHU_APP_ID}"
        app_secret: "${FEISHU_APP_SECRET}"
        dm_policy: "pairing"     # pairing | open | allowlist | disabled
        allow_from: []           # pairing admins / DM allowlist; also admins who can authorize a group by inviting the bot; open requires "*"
        group_policy: "allowlist"  # open | allowlist | disabled
        group_allow_from: []     # Group/chat allowlist (recommended for local bots)
        group_sender_allow_from: []  # Optional per-sender allowlist inside groups
        group_session_scope: "group_sender"  # group | group_sender | group_topic | group_topic_sender
        typing_indicator: true
        typing_mode: "placeholder"  # placeholder for animated Typing..., reaction for emoji only
        typing_emoji: "Typing"      # Used only when typing_mode: reaction
        # require_mention: true     # Optional override; open groups default false, others default true
        allowed_chats: []           # Legacy alias for group_allow_from
        allowed_users: []           # Legacy alias for allow_from
        groups:
          "oc_xxx_group_id":
            allow_from: ["ou_owner_open_id"]   # Per-group sender allowlist overrides global sender allowlist
            require_mention: false
            group_session_scope: "group_topic"
            agent_config:
              tool_profile: "group_safe"
        # If an allowlisted admin in allow_from invites the bot into a new group,
        # that group can also become dynamically authorized while the inviter
        # remains in the group.
        dms:
          "ou_owner_open_id":
            enabled: true
            agent_config:
              tool_profile: "coding"

        # Agent configuration
        agent_config:
          tool_profile: "research"

        # Group chats should use a downgraded agent profile
        group_agent_config:
          tool_profile: "group_safe"

      # International Lark app via WebSocket (long connection)
      - name: "lark_ws_bot"
        mode: "ws"
        domain: "lark"
        app_id: "${FEISHU_APP_ID}"
        app_secret: "${FEISHU_APP_SECRET}"
        dm_policy: "pairing"
        allow_from: []
        group_policy: "allowlist"
        group_allow_from: []
        group_sender_allow_from: []
        group_session_scope: "group_sender"
        typing_indicator: true
        typing_mode: "placeholder"
        # require_mention: true

        # Agent configuration
        agent_config:
          tool_profile: "research"

        group_agent_config:
          tool_profile: "group_safe"

      # Feishu / Lark webhook example
      # Keep one webhook account only if your app is configured for callback URLs.
      - name: "feishu_webhook_bot"
        mode: "webhook"
        domain: "feishu"         # Change to "lark" for international Lark
        app_id: "${FEISHU_APP_ID}"
        app_secret: "${FEISHU_APP_SECRET}"
        verification_token: "${FEISHU_VERIFICATION_TOKEN}"
        encrypt_key: "${FEISHU_ENCRYPT_KEY}"  # Optional: required only if event encryption is enabled
        webhook_url: "https://your-domain.com/feishu/events"
        dm_policy: "pairing"
        allow_from: []
        group_policy: "allowlist"
        group_allow_from: []
        group_sender_allow_from: []
        group_session_scope: "group_sender"
        typing_indicator: true
        typing_mode: "reaction"
        typing_emoji: "Typing"
        # require_mention: true

        # Agent configuration
        agent_config:
          tool_profile: "research"

        group_agent_config:
          tool_profile: "group_safe"

  # ========== CLI (Terminal) ==========
  cli:
    enabled: true  # CLI is always available in agent mode

# ========== Environment Variables ==========
# You can use ${VAR_NAME} syntax to reference environment variables
# Set them in your shell:
#   export TELEGRAM_BOT_TOKEN="your_token"
#   export DISCORD_BOT_TOKEN="your_token"
#   export FEISHU_APP_ID="your_app_id"
#   export FEISHU_APP_SECRET="your_secret"
#   export OPENROUTER_API_KEY="sk-or-v1-..."

# Or create a .env file:
#   TELEGRAM_BOT_TOKEN=your_token
#   DISCORD_BOT_TOKEN=your_token
#   OPENROUTER_API_KEY=sk-or-v1-...
