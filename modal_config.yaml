# Minimal Modal runtime configuration.
# Secrets are provided by Modal Secret, not this file.

agent:
  model: "deepseek/deepseek-v4-pro"
  provider: "openrouter"
  workspace: "/modal-data/workspace"
  max_iterations: 20
  tool_profile: "core"
  yolo_mode: true

channels:
  telegram:
    enabled: false
  discord:
    enabled: false
  feishu:
    enabled: false
  cli:
    enabled: false
